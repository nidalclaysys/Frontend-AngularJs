
<nav class="app-navbar" ng-class="{'nav-scrolled': shell.scrolled}">
    <div class="nav-inner">

        <a class="nav-brand" ui-sref="app.dashboard">
            <span class="nav-brand-icon">⚡</span>
            <span class="nav-brand-name">MyApp</span>
        </a>

        <ul class="nav-links" ng-class="{'nav-open': shell.menuOpen}">
            <li>
                <a ui-sref="app.adminUsers" ui-sref-active="nav-active" ng-click="shell.closeMenu()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a ui-sref="app.profile" ui-sref-active="nav-active" ng-click="shell.closeMenu()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    Profile
                </a>
            </li>
     
            <li ng-if="shell.isAdmin">
                <a ui-sref="app.adminUsers" ui-sref-active="nav-active" ng-click="shell.closeMenu()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    Users
                </a>
            </li>
            <li>
            <a ng-click="shell.logout()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Logout
            </a>
            </li>
        </ul>

        <div class="nav-right">
            <div class="profile-wrap" ng-class="{'open': shell.dropdownOpen}">
                <button class="profile-btn" ng-click="shell.toggleDropdown($event)">
                    <span class="avatar">{{ shell.initials }}</span>
                    <span class="profile-name d-none d-md-inline">{{ shell.user.firstName || shell.user.userName }}</span>
                    <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <polyline points="6 9 12 15 18 9" />
                    </svg>
                </button>

                <div class="profile-dropdown" ng-show="shell.dropdownOpen">
                    <div class="dropdown-header">
                        <span class="avatar avatar-lg">{{ shell.initials }}</span>
                        <div>
                            <div class="dropdown-name">{{ shell.user.firstName }} {{ shell.user.lastName }}</div>
                            <div class="dropdown-sub">@{{ shell.user.userName }}</div>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" ui-sref="app.profile" ng-click="shell.closeDropdown()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                        My Profile
                    </a>
                    <a class="dropdown-item" ui-sref="app.settings" ng-click="shell.closeDropdown()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" /></svg>
                        Settings
                    </a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item dropdown-logout" ng-click="shell.logout()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
                        Logout
                    </a>
                </div>
            </div>

            <button class="hamburger" ng-click="shell.toggleMenu()"
                    ng-class="{'is-open': shell.menuOpen}">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<div class="nav-backdrop"
     ng-show="shell.dropdownOpen || shell.menuOpen"
     ng-click="shell.closeAll()">
</div>


<div class="shell-body">
    <ui-view></ui-view>
</div>
